  .featured-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 6px; }
  .featured-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; color: var(--ink); line-height: 1.4; }

  .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cat-name { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-deep); white-space: nowrap; }
  .cat-divider { flex: 1; height: 1px; background: var(--line); }

  .item-info { flex: 1; min-width: 0; }

  .item-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--ink); line-height: 1.2; }
  .fav-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--gold); color: var(--ink); padding: 2px 6px; font-weight: 500; flex-shrink: 0; }
  .item-desc { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--ink-soft); margin-top: 3px; line-height: 1.4; }
  .item-warning { font-size: 11px; color: var(--gold-deep); margin-top: 4px; }
  .item-price { font-size: 13px; color: var(--gold-deep); margin-top: 6px; font-weight: 500; }
  .add-btn {

    font-size: 22px; transition: background 0.2s; line-height: 1;
  }
  .add-btn:hover { background: var(--gold-deep); }

  /* CART DRAWER */
  .drawer-overlay { display: none; position: fixed; inset: 0; z-index: 40; background: rgba(31,26,20,0.6); }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--cream); max-height: 90vh; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.3s ease;
    max-width: 600px; margin: 0 auto;

  .drawer-header { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
  .drawer-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; color: var(--ink); }
  .drawer-close { background: none; border: none; font-size: 24px; color: var(--ink-soft); cursor: pointer; padding: 4px; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .cart-line { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }

  .cart-line-price { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .qty-controls { display: flex; align-items: center; gap: 8px; }

  .qty-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; width: 20px; text-align: center; }
  .cart-line-total { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--ink); min-width: 56px; text-align: right; }

  .cart-extras { margin-top: 20px; }

  .special-input { width: 100%; padding: 10px 12px; background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; outline: none; }
  .tip-row { display: flex; gap: 8px; margin-top: 8px; }
  .tip-btn { flex: 1; padding: 10px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; border: 1px solid var(--line); background: var(--paper); color: var(--ink-soft); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .tip-btn.active { background: var(--ink); color: var(--gold); font-weight: 500; border-color: var(--ink); }

  .cart-totals { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--line); }

  .drawer-footer { padding: 16px 20px; border-top: 1px solid var(--line); background: var(--paper); }

  .modal-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 24px; color: var(--ink); margin-bottom: 4px; }
  .modal-sub { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 20px; }
  .mod-option { width: 100%; text-align: left; padding: 14px; border: 1px solid var(--line); background: var(--paper); color: var(--ink-soft); cursor: pointer; margin-bottom: 8px; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; font-family: 'DM Sans', sans-serif; }

  .sent-meta { font-size: 12px; color: var(--gold-deep); margin-top: 10px; font-family: 'DM Mono', monospace; }
  .sent-quote { max-width: 300px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--gold-soft); line-height: 1.6; margin-top: 40px; }
  .new-order-btn { margin-top: 48px; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold-soft); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  .sending-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(31,26,20,0.85); align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  .sending-overlay.show { display: flex; }
  .sending-text { color: var(--gold-soft); font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-family: 'DM Sans', sans-serif; }
</style>
</head>

let tipPercent = 0;
let specialNote = '';
let activeCat = 'All';
let modifierItem = null;
let modifierChoice = null;

// ── Get table from URL ?table=6 ───────────────────────
const urlParams = new URLSearchParams(window.location.search);
tableNumber = urlParams.get('table') || '?';

function goToMenu() {
  document.getElementById('menu-page').style.display = 'block';
  document.getElementById('header-table-label').textContent = 'Table ' + tableNumber;
  renderCategoryTabs();
  renderMenu();
}

// ── Category tabs ──────────────────────────────────────
function renderCategoryTabs() {
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = ['All', ...CATEGORIES].map(cat =>
    `<div class="cat-tab ${cat === activeCat ? 'active' : ''}" onclick="switchCat('${cat}')">${cat}</div>`
  ).join('');
}

function switchCat(cat) {
  activeCat = cat;
  renderCategoryTabs();
  renderMenu();
  document.getElementById('menu-body').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Menu render ────────────────────────────────────────
function renderMenu() {
  const body = document.getElementById('menu-body');
  const filtered = MENU.filter(m => activeCat === 'All' || m.cat === activeCat);

  let html = '';

  if (activeCat === 'All') {
    html += `<div class="featured-banner">
      <div class="featured-label">✦ Today at the cart</div>
      <div class="featured-text">This week's seasonal oysters are eating beautifully — try the bundle.</div>
    </div>`;

    CATEGORIES.forEach(cat => {
      const items = filtered.filter(m => m.cat === cat);
      if (!items.length) return;
      html += `<div class="cat-section">
        <div class="cat-header">
          <div class="cat-name">${cat}</div>
          <div class="cat-divider"></div>
        </div>
        ${items.map(item => renderItem(item)).join('')}
      </div>`;
    });
  } else {
    html += `<div class="cat-section">${filtered.map(item => renderItem(item)).join('')}</div>`;
  }

  body.innerHTML = html;
}

function renderItem(item) {
  return `<div class="menu-item">
    <div class="item-info">
      <div class="item-name-row">
        <div class="item-name serif">${item.name}</div>
        ${item.featured ? '<span class="fav-badge">Favourite</span>' : ''}
      </div>
      ${item.desc ? `<div class="item-desc serif">${item.desc}</div>` : ''}
      ${item.warning ? `<div class="item-warning">${item.warning}</div>` : ''}
      <div class="item-price">$${item.price.toFixed(2)}</div>
    </div>
    <button class="add-btn" onclick="handleAdd('${item.id}')">+</button>
  </div>`;
}

// ── Add item ───────────────────────────────────────────
function handleAdd(itemId) {
  const item = MENU.find(m => m.id === itemId);
  if (!item) return;
  if (item.modifiers) {
    modifierItem = item;
    modifierChoice = item.modifiers.options[0];
    openModifier();
  } else {
    addToCart(item, null);
  }
}

function addToCart(item, modifier) {
  const existing = cart.find(c => c.id === item.id && (c.modifier?.id || null) === (modifier?.id || null));
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ lineId: `${item.id}_${modifier?.id||''}_${Date.now()}`, id: item.id, qty: 1, modifier });
  }
  updateCartUI();
}

function adjustQty(lineId, delta) {
  const line = cart.find(c => c.lineId === lineId);
  if (!line) return;
  line.qty += delta;
  if (line.qty <= 0) cart = cart.filter(c => c.lineId !== lineId);
  updateCartUI();
  renderDrawer();
}

// ── Cart UI ────────────────────────────────────────────
function cartTotal() {
  return cart.reduce((s, c) => {
    const item = MENU.find(m => m.id === c.id);
    return s + (item.price + (c.modifier?.priceDelta || 0)) * c.qty;
  }, 0);
}
function cartCount() { return cart.reduce((s, c) => s + c.qty, 0); }

function updateCartUI() {
  const count = cartCount();
  const total = cartTotal();
  const tipAmt = total * tipPercent / 100;
  const grand = total + tipAmt;

  document.getElementById('cart-count-badge').textContent = count;
  document.getElementById('cart-bar-count').textContent = `${count} ${count === 1 ? 'item' : 'items'}`;
  document.getElementById('cart-bar-total').textContent = `$${total.toFixed(2)}`;

  const bar = document.getElementById('cart-bar');
  if (count > 0) bar.classList.add('visible');
  else bar.classList.remove('visible');
}

// ── Drawer ─────────────────────────────────────────────
function openDrawer() {
  renderDrawer();
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('cart-drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('cart-drawer').classList.remove('open');
}

function renderDrawer() {
  const body = document.getElementById('drawer-body');
  const footer = document.getElementById('drawer-footer');

  if (cart.length === 0) {
    body.innerHTML = `<div class="serif" style="text-align:center;padding:40px 0;font-style:italic;color:var(--ink-soft);">Your cart is empty.</div>`;
    footer.style.display = 'none';
    return;
  }

  const subtotal = cartTotal();
  const tipAmt = subtotal * tipPercent / 100;
  const grand = subtotal + tipAmt;

  body.innerHTML = cart.map(line => {
    const item = MENU.find(m => m.id === line.id);
    if (!item) return '';
    const unitPrice = item.price + (line.modifier?.priceDelta || 0);
    return `<div class="cart-line">
      <div class="cart-line-info">
        <div class="cart-line-name serif">${item.name}</div>
        ${line.modifier ? `<div class="cart-line-mod">${line.modifier.label}</div>` : ''}
        <div class="cart-line-price">$${unitPrice.toFixed(2)} each</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="adjustQty('${line.lineId}',-1)">−</button>
        <div class="qty-val serif">${line.qty}</div>
        <button class="qty-btn" onclick="adjustQty('${line.lineId}',1)">+</button>
      </div>
      <div class="cart-line-total serif">$${(unitPrice * line.qty).toFixed(2)}</div>
    </div>`;
  }).join('') + `
  <div class="cart-extras">
    <div class="extras-label">Special requests</div>
    <textarea class="special-input" rows="2" placeholder="e.g. no alcohol in clams pot" oninput="specialNote=this.value">${specialNote}</textarea>
    <div class="extras-label" style="margin-top:16px;">Gratuity</div>
    <div class="tip-row">
      ${[0,5,10].map(p => `<button class="tip-btn ${tipPercent===p?'active':''}" onclick="setTip(${p})">${p===0?'None':p+'%'}</button>`).join('')}
    </div>
  </div>
  <div class="cart-totals">
    <div class="total-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
    ${tipPercent > 0 ? `<div class="total-row"><span>Gratuity (${tipPercent}%)</span><span>$${tipAmt.toFixed(2)}</span></div>` : ''}
    <div class="total-row grand"><span class="serif" style="font-style:italic">Total</span><span>$${grand.toFixed(2)} <span style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-deep)">SGD</span></span></div>
  </div>`;

  footer.style.display = 'block';
}

function setTip(p) {
  tipPercent = p;
  renderDrawer();
}

// ── Modifier ───────────────────────────────────────────
function openModifier() {
  if (!modifierItem) return;
  document.getElementById('mod-title').textContent = modifierItem.name;
  document.getElementById('mod-sub').textContent = modifierItem.modifiers.label;
  document.getElementById('mod-options').innerHTML = modifierItem.modifiers.options.map(opt =>
    `<div class="mod-option ${modifierChoice?.id===opt.id?'selected':''}" onclick="selectMod('${opt.id}')">
      <span class="mod-option-name serif">${opt.label}</span>
      ${opt.priceDelta > 0 ? `<span>+$${opt.priceDelta}</span>` : ''}
    </div>`
  ).join('');
  document.getElementById('modifier-modal').classList.add('open');
}

function selectMod(optId) {
  modifierChoice = modifierItem.modifiers.options.find(o => o.id === optId);
  openModifier();
}

function closeModifier() {
  modifierItem = null;
  modifierChoice = null;
  document.getElementById('modifier-modal').classList.remove('open');
}

function confirmModifier() {
  if (modifierItem && modifierChoice) {
    addToCart(modifierItem, modifierChoice);
    closeModifier();
  }
}

// ── Send order ─────────────────────────────────────────
async function sendOrder() {
  if (!cart.length) return;

  closeDrawer();
  document.getElementById('sending-overlay').classList.add('show');

  const subtotal = cartTotal();
  const tipAmt = subtotal * tipPercent / 100;
  const grand = subtotal + tipAmt;

  const payload = {
    orderId: `TOC-${Date.now()}`,
    timestamp: new Date().toISOString(),
    tableNumber,
    type: 'dine-in',
    lines: cart.map(c => {
      const item = MENU.find(m => m.id === c.id);
      return {
        itemId: c.id,
        name: item.name,
        category: item.cat,
        quantity: c.qty,
        unitPrice: item.price + (c.modifier?.priceDelta || 0),
        modifier: c.modifier ? { id: c.modifier.id, label: c.modifier.label } : null,
        warning: item.warning || null,
      };
    }),
    specialRequest: specialNote || null,
    subtotal: parseFloat(subtotal.toFixed(2)),
    tip: { percent: tipPercent, amount: parseFloat(tipAmt.toFixed(2)) },
    total: parseFloat(grand.toFixed(2)),
    currency: 'SGD',
  };

  try {
    const res = await fetch('/.netlify/functions/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed to send order');

    document.getElementById('sending-overlay').classList.remove('show');
    document.getElementById('menu-page').style.display = 'none';
    document.getElementById('cart-bar').classList.remove('visible');
    const sentPage = document.getElementById('sent-page');
    sentPage.style.display = 'flex';
    document.getElementById('sent-meta').textContent = `Table ${tableNumber} · $${grand.toFixed(2)} SGD`;

  } catch (err) {
    document.getElementById('sending-overlay').classList.remove('show');
    alert('Sorry, there was an error sending your order. Please ask your server for help.');
    console.error(err);
  }
}

function resetMenu() {
  cart = [];
  tipPercent = 0;
  specialNote = '';
  activeCat = 'All';
  document.getElementById('sent-page').style.display = 'none';
  document.getElementById('menu-page').style.display = 'block';
  document.getElementById('cart-bar').classList.remove('visible');
  updateCartUI();
  renderCategoryTabs();
  renderMenu();
}

// Go straight to menu — table comes from QR code URL
goToMenu();
</script>
</body>
</html>
